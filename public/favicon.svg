<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Outer rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="#050B14"/>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="url(#g)" stroke-width="12"/>
  <!-- CPU/Circuit icon -->
  <!-- Central chip -->
  <rect x="176" y="176" width="160" height="160" rx="24" fill="none" stroke="url(#g)" stroke-width="14"/>
  <!-- Inner core -->
  <rect x="216" y="216" width="80" height="80" rx="12" fill="url(#g)" opacity="0.9"/>
  <!-- Pins - Top -->
  <line x1="220" y1="176" x2="220" y2="128" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="176" x2="256" y2="112" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <line x1="292" y1="176" x2="292" y2="128" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <!-- Pins - Bottom -->
  <line x1="220" y1="336" x2="220" y2="384" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="336" x2="256" y2="400" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <line x1="292" y1="336" x2="292" y2="384" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <!-- Pins - Left -->
  <line x1="176" y1="220" x2="128" y2="220" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <line x1="176" y1="256" x2="112" y2="256" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <line x1="176" y1="292" x2="128" y2="292" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <!-- Pins - Right -->
  <line x1="336" y1="220" x2="384" y2="220" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <line x1="336" y1="256" x2="400" y2="256" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <line x1="336" y1="292" x2="384" y2="292" stroke="url(#g)" stroke-width="10" stroke-linecap="round"/>
  <!-- Corner dots -->
  <circle cx="128" cy="128" r="8" fill="#22d3ee" opacity="0.5"/>
  <circle cx="384" cy="128" r="8" fill="#22d3ee" opacity="0.5"/>
  <circle cx="128" cy="384" r="8" fill="#22d3ee" opacity="0.5"/>
  <circle cx="384" cy="384" r="8" fill="#22d3ee" opacity="0.5"/>
