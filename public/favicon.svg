<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cyber-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="neon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="512" height="512" rx="112" fill="#050B14"/>
  <rect width="512" height="512" rx="112" fill="none" stroke="url(#cyber-glow)" stroke-width="12" opacity="0.3"/>

  <!-- Circuit paths background -->
  <path d="M 64 256 L 144 256 L 184 216" fill="none" stroke="#22d3ee" stroke-width="4" stroke-opacity="0.2"/>
  <path d="M 448 256 L 368 256 L 328 296" fill="none" stroke="#22d3ee" stroke-width="4" stroke-opacity="0.2"/>
  <path d="M 256 64 L 256 128 L 296 168" fill="none" stroke="#22d3ee" stroke-width="4" stroke-opacity="0.2"/>
  <circle cx="184" cy="216" r="4" fill="#22d3ee" opacity="0.2"/>
  <circle cx="328" cy="296" r="4" fill="#22d3ee" opacity="0.2"/>
  <circle cx="296" cy="168" r="4" fill="#22d3ee" opacity="0.2"/>

  <!-- Letter O (Outer Ring) -->
  <path d="M 256 120 C 180 120 120 180 120 256 C 120 332 180 392 256 392 C 332 392 392 332 392 256 C 392 180 332 120 256 120 Z M 256 160 C 309 160 352 203 352 256 C 352 309 309 352 256 352 C 203 352 160 309 160 256 C 160 203 203 160 256 160 Z" fill="url(#cyber-glow)" filter="url(#neon-shadow)"/>
  
  <!-- Letter A (Inner Tech Cut) -->
  <path d="M 256 184 L 192 312 L 224 312 L 236 284 L 276 284 L 288 312 L 320 312 L 256 184 Z M 245 258 L 256 230 L 267 258 L 245 258 Z" fill="#050B14" stroke="url(#accent-glow)" stroke-width="8" stroke-linejoin="round" filter="url(#neon-shadow)"/>

  <!-- High-tech dots -->
  <circle cx="256" cy="256" r="40" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="4 8" opacity="0.5"/>
</svg>
