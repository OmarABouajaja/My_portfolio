name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Add Android Platform (Capacitor)
        run: |
          npx cap add android || echo "Android platform already exists, skipping..."
          npx cap sync android

      - name: Grant Gradlew Execute Permission
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build APK (Release Debug)
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-engine-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "🚀 Nexus Engine — Build #${{ github.run_number }}"
          body: |
            **Automated Android APK Build**

            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - Built at: `${{ github.event.head_commit.timestamp }}`

            > Install on any Android device by downloading `app-debug.apk` below.
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
